<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1262b8"/>
      <stop offset="100%" stop-color="#032451"/>
    </linearGradient>
    <linearGradient id="bananaFill" x1="145" y1="390" x2="400" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C07C00"/>
      <stop offset="35%" stop-color="#F0B500"/>
      <stop offset="70%" stop-color="#FFD83D"/>
      <stop offset="100%" stop-color="#FFEC7A"/>
    </linearGradient>
    <linearGradient id="leafFill" x1="120" y1="80" x2="210" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#52D07A"/>
      <stop offset="100%" stop-color="#1A7A40"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- Fundo quadrado arredondado -->
  <rect width="512" height="512" rx="88" fill="url(#bg)"/>

  <!-- Faixa de brilho sutil no topo do fundo -->
  <ellipse cx="256" cy="60" rx="240" ry="80" fill="white" opacity="0.04"/>

  <!-- Folha de bananeira (atrás da banana) -->
  <ellipse cx="162" cy="238" rx="50" ry="162" fill="url(#leafFill)"
           transform="rotate(-22, 162, 238)" filter="url(#shadow)" opacity="0.92"/>

  <!-- Nervura central da folha -->
  <line x1="94" y1="108" x2="212" y2="364"
        stroke="#6DDEA0" stroke-width="4" stroke-linecap="round" opacity="0.45"/>

  <!-- Nervuras laterais da folha -->
  <line x1="94" y1="108" x2="148" y2="175" stroke="#6DDEA0" stroke-width="2" opacity="0.3"/>
  <line x1="120" y1="165" x2="165" y2="218" stroke="#6DDEA0" stroke-width="2" opacity="0.3"/>
  <line x1="152" y1="225" x2="190" y2="268" stroke="#6DDEA0" stroke-width="2" opacity="0.3"/>

  <!-- Banana principal -->
  <!-- Arco de canto inferior-esquerdo (ponta) até canto superior-direito (ponta) -->
  <path d="M 145 392
           C 100 318 104 224 158 152
           C 196 103 250 80 318 88
           C 366 94 402 128 398 180
           C 376 163 344 156 308 163
           C 265 171 228 202 205 250
           C 181 298 176 350 145 392 Z"
        fill="url(#bananaFill)" filter="url(#shadow)"/>

  <!-- Brilho/reflexo na borda convexa da banana -->
  <path d="M 170 158 C 204 116 256 96 316 104 C 284 95 244 100 214 122
           C 197 133 181 145 170 158 Z"
        fill="white" opacity="0.30"/>

  <!-- Brilho secundário (realce central) -->
  <path d="M 200 220 C 215 198 236 182 262 174 C 240 180 220 197 205 218 Z"
        fill="white" opacity="0.14"/>

  <!-- Cabo/talo da banana -->
  <path d="M 320 90 C 333 75 356 72 368 85 C 353 77 335 80 322 92 Z"
        fill="#6B4500" stroke="#7B5010" stroke-width="1.5"/>

  <!-- Ponta inferior arredondada da banana -->
  <ellipse cx="145" cy="390" rx="11" ry="7"
           fill="#A06400" transform="rotate(-40, 145, 390)"/>

  <!-- Três pequenos pontos no canto para identidade "gestão / painel" -->
  <circle cx="400" cy="395" r="9" fill="white" opacity="0.55"/>
  <circle cx="428" cy="395" r="9" fill="white" opacity="0.35"/>
  <circle cx="456" cy="395" r="9" fill="white" opacity="0.20"/>
</svg>
