<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <title>Gerador de Ícones — Gestão de Frutas</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      gap: 32px;
      color: #1e293b;
    }
    h1 { font-size: 22px; margin: 0; color: #063f81; }
    p  { margin: 0; color: #64748b; font-size: 14px; text-align: center; }
    .card {
      background: white;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 2px 12px rgba(0,0,0,.10);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      min-width: 280px;
    }
    canvas { border-radius: 18px; box-shadow: 0 4px 20px rgba(0,0,0,.18); }
    button {
      background: #063f81;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 28px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    button:hover { background: #052e60; }
    .row { display: flex; gap: 32px; flex-wrap: wrap; justify-content: center; }
    .label { font-size: 13px; font-weight: 700; color: #475569; letter-spacing: .05em; text-transform: uppercase; }
    .status { font-size: 12px; color: #10b981; font-weight: 600; min-height: 18px; }
  </style>
</head>
<body>
  <div style="text-align:center">
    <h1>🍌 Gestão de Frutas — Gerador de Ícones</h1>
    <p>Renderiza o icon.svg nos tamanhos corretos e permite baixar como PNG.</p>
  </div>

  <div class="row">
    <div class="card">
      <span class="label">192 × 192 px</span>
      <canvas id="c192" width="192" height="192"></canvas>
      <div class="status" id="s192"></div>
      <button onclick="baixar(192)">⬇ Baixar icon-192.png</button>
    </div>

    <div class="card">
      <span class="label">512 × 512 px</span>
      <canvas id="c512" width="512" height="512"></canvas>
      <div class="status" id="s512"></div>
      <button onclick="baixar(512)">⬇ Baixar icon-512.png</button>
    </div>
  </div>

  <p style="max-width:500px">
    Após baixar, mova os arquivos para <code>public/icon-192.png</code> e
    <code>public/icon-512.png</code>, e referencie-os no <code>manifest.json</code>.
  </p>

  <script>
    const SVG_URL = 'icon.svg'

    function renderCanvas(size) {
      return new Promise((resolve, reject) => {
        const canvas = document.getElementById('c' + size)
        const ctx = canvas.getContext('2d')
        const img = new Image()

        // força re-load para evitar cache cruzado
        img.onload = () => {
          ctx.clearRect(0, 0, size, size)
          ctx.drawImage(img, 0, 0, size, size)
          URL.revokeObjectURL(img.src)
          resolve(canvas)
        }
        img.onerror = reject

        // fetch → blob → objectURL para evitar tainting
        fetch(SVG_URL)
          .then(r => r.blob())
          .then(blob => { img.src = URL.createObjectURL(blob) })
          .catch(reject)
      })
    }

    function baixar(size) {
      const status = document.getElementById('s' + size)
      status.textContent = 'Gerando…'
      renderCanvas(size)
        .then(canvas => {
          canvas.toBlob(blob => {
            const a = document.createElement('a')
            a.href = URL.createObjectURL(blob)
            a.download = `icon-${size}.png`
            a.click()
            status.textContent = '✓ Download iniciado!'
            setTimeout(() => status.textContent = '', 3000)
          }, 'image/png')
        })
        .catch(err => {
          status.style.color = '#ef4444'
          status.textContent = 'Erro: abra via servidor local (npx serve public).'
          console.error(err)
        })
    }

    // pré-renderiza ambos ao carregar
    window.addEventListener('load', () => {
      renderCanvas(192).catch(() => {})
      renderCanvas(512).catch(() => {})
    })
  </script>
</body>
</html>
