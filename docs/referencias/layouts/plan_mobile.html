<!DOCTYPE html>

<html class="light" lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Painel de Avaliação - Precision Archive</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "secondary-fixed": "#cbe7f5",
                        "primary-container": "#003366",
                        "surface-bright": "#f7f9fb",
                        "surface-variant": "#e0e3e5",
                        "surface-tint": "#3a5f94",
                        "secondary-fixed-dim": "#afcbd8",
                        "on-error": "#ffffff",
                        "tertiary-fixed": "#6ffbbe",
                        "secondary": "#48626e",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#93000a",
                        "tertiary": "#002416",
                        "surface-dim": "#d8dadc",
                        "primary": "#001e40",
                        "on-primary-fixed-variant": "#1f477b",
                        "on-secondary-fixed-variant": "#304a55",
                        "on-tertiary-container": "#00b27b",
                        "tertiary-fixed-dim": "#4edea3",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed-variant": "#005236",
                        "inverse-on-surface": "#eff1f3",
                        "tertiary-container": "#003c27",
                        "on-tertiary": "#ffffff",
                        "on-surface-variant": "#43474f",
                        "on-background": "#191c1e",
                        "primary-fixed-dim": "#a7c8ff",
                        "on-primary": "#ffffff",
                        "on-tertiary-fixed": "#002113",
                        "on-primary-container": "#799dd6",
                        "inverse-primary": "#a7c8ff",
                        "surface-container": "#eceef0",
                        "inverse-surface": "#2d3133",
                        "error-container": "#ffdad6",
                        "outline": "#737780",
                        "on-secondary-fixed": "#021f29",
                        "on-secondary-container": "#4e6874",
                        "outline-variant": "#c3c6d1",
                        "surface-container-high": "#e6e8ea",
                        "surface": "#f7f9fb",
                        "surface-container-highest": "#e0e3e5",
                        "background": "#f7f9fb",
                        "on-primary-fixed": "#001b3c",
                        "error": "#ba1a1a",
                        "primary-fixed": "#d5e3ff",
                        "surface-container-low": "#f2f4f6",
                        "secondary-container": "#cbe7f5",
                        "on-surface": "#191c1e"
                    },
                    fontFamily: {
                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
        body {
          min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-slate-50/80 dark:bg-slate-900/80 backdrop-blur-xl shadow-sm">
<div class="flex justify-between items-center w-full px-6 py-4">
<div class="flex items-center gap-3">
<button class="text-[#001e40] dark:text-[#cbe7f5] hover:bg-slate-200/50 transition-colors p-2 rounded-full active:scale-95 duration-200">
<span class="material-symbols-outlined">menu</span>
</button>
<h1 class="font-manrope font-black text-[#001e40] dark:text-white tracking-tighter text-xl">Precision Archive</h1>
</div>
<div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container font-bold border-2 border-white shadow-sm overflow-hidden">
<img alt="Executive Profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDZISvcN5eF-jS5orMMX3lcTDHyI2dc_RmqOXGZc26IeZwHqkuGj9CMKOvc3tZNs_wZaNnqiafS1fnfZ-oQmNbXY-U4wgMafGNnoBfK_sjCbZp-7bnooETC5vOvXR-GAAOLUqFAxkJaOa81mf-434GsXChiPpnXoh8znqndrMl_NRr54-_eA6cEVpME55eCNtQXByMvz2bl0NQl-eLJTfqw0HBjnEyrmBMj0a2qHJ7y0uaYSxe68-hOBaF6k4YfW5zohRboYsjPNIYo"/>
</div>
</div>
</header>
<main class="pt-24 px-4 max-w-md mx-auto space-y-8">
<!-- Page Title & Editorial Header -->
<section class="mb-10">
<p class="font-label text-on-tertiary-container font-bold text-xs uppercase tracking-[0.2em] mb-2">Relatório Operacional</p>
<h2 class="font-headline font-extrabold text-3xl text-primary tracking-tight">Painel de Avaliação</h2>
<div class="h-1 w-12 bg-surface-tint mt-4 rounded-full"></div>
</section>
<!-- Section 1: Top Number Selector -->
<section class="bg-surface-container-low p-6 rounded-xl shadow-sm">
<label class="block font-headline font-bold text-primary mb-4 flex items-center gap-2">
<span class="material-symbols-outlined text-surface-tint">tag</span>
            Selecione o Número da Unidade
        </label>
<div class="relative group">
<select class="w-full appearance-none bg-surface-container-highest border-none rounded-lg px-4 py-4 text-on-surface font-semibold focus:ring-2 focus:ring-primary transition-all">
<option disabled="" selected="" value="">Escolha um número (1-12)</option>
<script>
                    for(let i=1; i<=12; i++) {
                        document.write(`<option value="${i}">Unidade ${i.toString().padStart(2, '0')}</option>`);
                    }
                </script>
</select>
<div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</section>
<!-- Section 2: Quadra Horizontal Selector -->
<section class="bg-surface-container-low py-6 rounded-xl shadow-sm">
<div class="px-6 mb-4 flex justify-between items-center">
<label class="font-headline font-bold text-primary flex items-center gap-2">
<span class="material-symbols-outlined text-surface-tint">grid_view</span>
                Seleção de Quadra
            </label>
<span class="text-xs font-bold text-outline-variant uppercase tracking-widest">Scroll Lateral</span>
</div>
<div class="flex overflow-x-auto px-6 gap-3 hide-scrollbar snap-x">
<script>
                for(let i=1; i<=20; i++) {
                    const isActive = i === 1;
                    const bgClass = isActive ? 'bg-secondary-container' : 'bg-surface-container-lowest';
                    const textClass = isActive ? 'text-primary' : 'text-on-surface-variant';
                    document.write(`
                        <button class="snap-start flex-shrink-0 w-24 h-24 ${bgClass} ${textClass} rounded-xl shadow-sm flex flex-col items-center justify-center border-b-4 ${isActive ? 'border-primary' : 'border-transparent'} transition-all active:scale-90">
                            <span class="text-[10px] font-bold uppercase tracking-tighter opacity-70">Quadra</span>
                            <span class="text-2xl font-black">${i.toString().padStart(2, '0')}</span>
                        </button>
                    `);
                }
            </script>
</div>
</section>
<!-- Section 3: Vertical Evaluation List -->
<section class="space-y-4">
<div class="flex items-center justify-between mb-4">
<h3 class="font-headline font-bold text-xl text-primary">Status do Trabalho</h3>
<span class="bg-primary-fixed text-on-primary-fixed px-3 py-1 rounded-full text-xs font-bold tracking-tight">20 Becas</span>
</div>
<div class="space-y-3">
<script>
                const items = Array.from({length: 20}, (_, i) => `Beca ${(i + 1).toString().padStart(2, '0')}`);
                items.forEach((item, index) => {
                    document.write(`
                        <div class="bg-surface-container-low p-3 rounded-xl transition-all hover:bg-surface-container shadow-sm">
                            <div class="flex items-center justify-between mb-2">
                                <h4 class="font-headline font-bold text-on-surface text-sm">${item}</h4>
                            </div>
                            <div class="flex gap-1.5">
                                <!-- Green / Pass -->
                                <button class="flex-1 flex flex-col items-center justify-center p-1.5 rounded-lg border-b-2 border-transparent bg-surface-container-lowest hover:bg-tertiary-fixed-dim transition-colors group">
                                    <span class="material-symbols-outlined text-on-tertiary-container text-sm mb-0.5 group-active:scale-110 transition-transform">check_circle</span>
                                    <span class="text-[8px] font-bold uppercase text-on-tertiary-container leading-none">OK</span>
                                </button>
                                <!-- Yellow / Alert -->
                                <button class="flex-1 flex flex-col items-center justify-center p-1.5 rounded-lg border-b-2 border-transparent bg-surface-container-lowest hover:bg-yellow-100 transition-colors group">
                                    <span class="material-symbols-outlined text-amber-600 text-sm mb-0.5 group-active:scale-110 transition-transform">warning</span>
                                    <span class="text-[8px] font-bold uppercase text-amber-700 leading-none">EM ANDAMENTO</span>
                                </button>
                                <!-- Red / Fail -->
                                <button class="flex-1 flex flex-col items-center justify-center p-1.5 rounded-lg border-b-2 border-error bg-error-container group active:scale-95 transition-all">
                                    <span class="material-symbols-outlined text-error text-sm mb-0.5" style="font-variation-settings: 'FILL' 1;">cancel</span>
                                    <span class="text-[8px] font-bold uppercase text-on-error-container leading-none">NÃO REALIZADO</span>
                                </button>
                            </div>
                        </div>
                    `);
                });
            </script>
</div>
</section>
<!-- Submit Button -->
<div class="py-12">
<button class="w-full py-5 rounded-full bg-gradient-to-r from-primary to-primary-container text-white font-headline font-extrabold text-lg shadow-xl shadow-primary-container/20 flex items-center justify-center gap-3 active:scale-95 transition-all">
            Finalizar Avaliação
            <span class="material-symbols-outlined">send</span>
</button>
<p class="text-center text-outline text-xs mt-4 font-medium italic">Dados registrados em tempo real no arquivo de precisão</p>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 bg-slate-50 dark:bg-slate-950 flex justify-around items-center px-4 pb-6 pt-3 shadow-[0_-8px_30px_rgb(0,0,0,0.04)] rounded-t-3xl border-t border-slate-200/10 dark:border-slate-800/20">
<a class="flex flex-col items-center justify-center bg-[#cbe7f5] dark:bg-[#003366] text-[#001e40] dark:text-white rounded-2xl px-5 py-2 transition-all duration-300" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">fact_check</span>
<span class="font-inter text-[10px] font-bold uppercase tracking-widest mt-1">Evaluate</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 hover:text-[#003366] transition-all duration-300" href="#">
<span class="material-symbols-outlined">inventory_2</span>
<span class="font-inter text-[10px] font-bold uppercase tracking-widest mt-1">History</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 hover:text-[#003366] transition-all duration-300" href="#">
<span class="material-symbols-outlined">monitoring</span>
<span class="font-inter text-[10px] font-bold uppercase tracking-widest mt-1">Analytics</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 hover:text-[#003366] transition-all duration-300" href="#">
<span class="material-symbols-outlined">person</span>
<span class="font-inter text-[10px] font-bold uppercase tracking-widest mt-1">Account</span>
</a>
</nav>
</body></html>
